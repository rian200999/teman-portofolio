<section class="tier-section bg-light" id="basic-templates">
    <div class="container">
        <!-- HEADER & CAPSULES (Yang tadi hilang) -->
        <div class="tier-header" data-aos="fade-up">
            <div class="tp-section-badge badge-lilac">Paket Rp 49k</div>
            <h2>Basic <span>Templates</span></h2>
            <p>1 Halaman Penuh (Single Page). Cukup klik nama template untuk melihat detailnya.</p>
            
            <!-- CAPSULE NAVIGATION -->
            <div class="capsule-nav">
                <button class="capsule-btn active" data-id="basic-1">Terminal V1</button>
                <button class="capsule-btn" data-id="basic-2">Minimalist Repo</button>
                <button class="capsule-btn" data-id="basic-3">Tech Card</button>
                <button class="capsule-btn" data-id="basic-4">Split View</button>
                <button class="capsule-btn" data-id="basic-5">Data Flow</button>
            </div>
        </div>

        <div class="template-row" data-aos="fade-up">
            <!-- KIRI: MOCKUP BROWSER (DYNAMIC) -->
            <div class="mockup-col">
                <div class="mini-browser">
                    <div class="browser-header">
                        <div class="b-dots"><span></span><span></span><span></span></div>
                        <div class="b-url"><i class='bx bx-lock-alt'></i> rian.temanportofolio.com</div>
                    </div>
                    
                    <!-- BROWSER BODY (Template 1-5 akan masuk ke sini otomatis) -->
                    <div class="browser-body theme-dark" id="mockup-basic-wrapper">
                        <!-- HTML TEMPLATE DI-INJECT KE SINI OLEH JS -->
                    </div>
                </div>
            </div>

            <!-- KANAN: KONTROL WARNA & CTA -->
            <div class="control-col">
                <!-- ID ini penting banget biar nggak error JS -->
                <h3 id="basic-title">Terminal V1</h3>
                <p id="basic-desc">Desain klasik ala hacker dengan struktur layaknya IDE.</p>
                
                <div class="color-switcher">
                    <label>Eksplorasi Tema Warna:</label>
                    <div class="swatch-group" data-target="mockup-basic-wrapper">
                        <button class="swatch bg-red" data-theme="theme-red" title="Merah"></button>
                        <button class="swatch bg-yellow" data-theme="theme-yellow" title="Kuning"></button>
                        <button class="swatch bg-green" data-theme="theme-green" title="Hijau"></button>
                        <button class="swatch bg-blue" data-theme="theme-blue" title="Biru"></button>
                        <button class="swatch bg-dark active" data-theme="theme-dark" title="Dark"></button>
                        <button class="swatch bg-light" data-theme="theme-light" title="Light"></button>
                        <button class="swatch bg-purple" data-theme="theme-purple" title="Ungu"></button>
                        <button class="swatch bg-pink" data-theme="theme-pink" title="Pink"></button>
                    </div>
                </div>

                <div class="control-cta">
                    <!-- ID ini juga penting -->
                    <a href="#" id="basic-cta-btn" class="btn-pesan-template" target="_blank">
                        Pesan Desain Ini <i class='bx bx-rocket'></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
