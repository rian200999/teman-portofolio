
<section class="tier-section bg-light" id="basic-templates">
    <div class="container">
        <div class="tier-header" data-aos="fade-up">
            <div class="tp-section-badge badge-lilac" style="background:#FF6B6B; color:#FFF; border:none;">Paket Rp 49k</div>
            <h2>Basic <span>Templates</span></h2>
            <p>Layout portofolio single page yang fokus pada keindahan visual. Karyamu adalah bintang utamanya.</p>
            
            <div class="capsule-nav">
                <button class="capsule-btn active" data-id="basic-1">Clean Gallery (UI/UX)</button>
                <button class="capsule-btn" data-id="basic-2">Masonry Art (Graphic)</button>
                <button class="capsule-btn" data-id="basic-3">Cinematic (Video)</button>
                <button class="capsule-btn" data-id="basic-4">Brutalist (Edgy)</button>
                <button class="capsule-btn" data-id="basic-5">Soft Canvas (Illustrator)</button>
            </div>
        </div>

        <div class="template-row" data-aos="fade-up">
            <div class="mockup-col">
                <div class="mini-browser">
                    <div class="browser-header">
                        <div class="b-dots"><span></span><span></span><span></span></div>
                        <div class="b-url"><i class='bx bx-lock-alt'></i> siti.temanportofolio.com</div>
                    </div>
                    <div class="browser-body theme-mono" id="mockup-creator-wrapper">
                        <!-- HTML TEMPLATE DI-INJECT KE SINI -->
                    </div>
                </div>
            </div>

            <div class="control-col">
                <h3 id="basic-title">Clean Gallery</h3>
                <p id="basic-desc">Minimalis dan elegan. Memberikan ruang napas (white space) yang luas agar desain UI/UX-mu terlihat menonjol.</p>
                
                <div class="color-switcher">
                    <label>Eksplorasi Tema Warna:</label>
                    <div class="swatch-group" data-target="mockup-creator-wrapper">
                        <button class="swatch bg-red" style="background:#000" data-theme="theme-mono" title="Monochrome"></button>
                        <button class="swatch bg-dark active" style="background:#111" data-theme="theme-dark" title="Dark"></button>
                        <button class="swatch" style="background:#FF6B6B" data-theme="theme-coral" title="Coral"></button>
                        <button class="swatch" style="background:#38A169" data-theme="theme-mint" title="Mint"></button>
                        <button class="swatch" style="background:#2B6CB0" data-theme="theme-navy" title="Navy"></button>
                        <button class="swatch" style="background:#9F7AEA" data-theme="theme-pastel" title="Pastel"></button>
                        <button class="swatch" style="background:#D69E2E" data-theme="theme-yellow" title="Yellow"></button>
                        <button class="swatch" style="background:#00FFCC" data-theme="theme-cyber" title="Cyber"></button>
                    </div>
                </div>

                <div class="control-cta">
                    <a href="#" id="basic-cta-btn" class="btn-pesan-template" style="background:#FF6B6B; color:#FFF; border:none;" target="_blank">
                        Pesan Desain Ini <i class='bx bx-palette'></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
