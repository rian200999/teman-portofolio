.navbar-global .logo { font-size: 24px; font-weight: 900; color: var(--tp-text-main); text-decoration: none; z-index: 1001; }

    background: var(--tp-text-main); color: #FFF; padding: 10px 20px; border-radius: 50px;

/* Hamburger Icon */
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; }

/* CSS MOBILE NAVBAR (HAMBURGER) */
@media (max-width: 768px) {
    body { padding-bottom: 0 !important; } /* Reset padding dari navbar bawah sebelumnya */
    
    .hamburger { display: flex; }
    
    .nav-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(15px);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 40px;
        transform: translateY(-100%);
        opacity: 0;
        visibility: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1000;
    }
    
    .nav-wrapper.active {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
    }
    
    .nav-links { flex-direction: column; gap: 25px; text-align: center; }
    .nav-link { font-size: 20px; }
    .btn-nav-wa { font-size: 16px; padding: 15px 30px; }
    
    /* Hamburger Animasi (X) */
    .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
}
</style>

<script>
(function() {
    // 1. Auto Active Link
    const currentPath = window.location.pathname.split('/').pop() || 'index.html';
    const allLinks = document.querySelectorAll('.nav-link');
    allLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === currentPath) {
            link.classList.add('active');
        }
    });

    // 2. Hamburger Logic
    const hamburger = document.getElementById('hamburger-menu');
    const navWrapper = document.getElementById('nav-wrapper');
    
    if (hamburger && navWrapper) {
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navWrapper.classList.toggle('active');
            // Kunci scroll background saat menu terbuka
            document.body.style.overflow = navWrapper.classList.contains('active') ? 'hidden' : 'auto';
        });

        // Tutup menu kalau link di-klik
        allLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navWrapper.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });
    }
})();
</script>
