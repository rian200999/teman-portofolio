<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Builder Templates - Teman Portofolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/katalog/global.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="stylesheet" href="assets/css/layanan.css">
    <link rel="stylesheet" href="assets/css/katalog/detail-kategori.css">
    <link rel="stylesheet" href="assets/css/katalog/builder-shell.css">
</head>
<body>
    <header id="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">Teman<span>Portofolio.</span></a>

            <nav class="navbar">
                <!-- <a href="#home" class="nav-link active">Beranda</a>
                <a href="#layanan" class="nav-link">Layanan</a>
                <a href="#harga" class="nav-link">Harga</a> -->
                <a href="katalog.html" class="nav-link active">
                    Kembali ke Katalog
                </a>
            </nav>

            <div class="menu-icon" id="menu-btn">
                <i class='bx bx-menu-alt-right'></i>
            </div>
        </div>
    </header>

    <main id="detail-content"></main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/katalog/detail-kategori.js"></script>
    <script src="assets/js/katalog/b-basic-controller.js"></script>
    <script src="assets/js/katalog/b-premium-controller.js"></script>
    <script src="assets/js/katalog/b-pro-controller.js"></script>
    <script src="assets/js/footer.js"></script>

    <script>
        const loadSection = async (containerId, filePath) => {
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const htmlText = await response.text();
                const container = document.getElementById(containerId);
                if (container) { container.insertAdjacentHTML('beforeend', htmlText); }
            } catch (error) { console.warn(`Gagal memuat ${filePath}:`, error.message); }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await loadSection('detail-content', 'sections/detail-builder/hero.html');
            await loadSection('detail-content', 'sections/detail-builder/basic.html');
            await loadSection('detail-content', 'sections/detail-builder/premium.html');
            await loadSection('detail-content', 'sections/detail-builder/pro.html');
            await loadSection('detail-content', 'sections/footer.html');

            if (typeof window.initBBasicController === 'function') window.initBBasicController();
            if (typeof window.initBPremiumController === 'function') window.initBPremiumController();
            if (typeof window.initBProController === 'function') window.initBProController();
            if (typeof window.initColorSwitcher === 'function') window.initColorSwitcher();
            // 3. Init Footer
            if (typeof window.initFooter === 'function') window.initFooter();

            if (typeof AOS !== 'undefined') { AOS.init({ once: true, duration: 800 }); }
        });
    </script>
</body>
</html>
